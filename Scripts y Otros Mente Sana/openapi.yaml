openapi: 3.0.0
info:
  title: API de Gestión y Facturación Centro Psicológico Mente Sana
  description: Contratos de servicios web REST para la plataforma interna de NovaBit. Administra la autenticación, la asignación de citas con bloqueo horario y la emisión de facturas consecutivas.
  version: 1.0.0
servers:
  - url: http://localhost:3000/api/v1
    description: Servidor local de desarrollo backend NestJS
paths:
  /auth/login:
    post:
      summary: Autenticar usuario del personal administrativo o especialista
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - correo
                - contrasena
              properties:
                correo:
                  type: string
                  format: email
                  example: d.vesga@novabit.com
                contrasena:
                  type: string
                  format: password
                  example: "MenteSana2026*"
      responses:
        '200':
          description: Autenticación exitosa y emisión del token de acceso
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokenDeAcceso:
                    type: string
                    description: Token JWT firmado mediante el algoritmo HS256
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  usuario:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      nombre:
                        type: string
                        example: "Didier Vesga"
                      rol:
                        type: string
                        enum: [Administrador, Especialista, Recepcion]
                        example: "Administrador"
        '401':
          description: Credenciales de acceso incorrectas o inválidas

  /citas:
    get:
      summary: Obtener el listado general de citas agendadas
      operationId: obtenerCitas
      security:
        - BearerAuth: []
      parameters:
        - name: fecha
          in: query
          required: false
          description: Filtrar las citas de una fecha específica
          schema:
            type: string
            format: date
            example: "2026-06-15"
      responses:
        '200':
          description: Lista de citas obtenida correctamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cita'
        '401':
          description: Token de autenticación ausente o expirado

    post:
      summary: Registrar una nueva cita en la agenda
      operationId: crearCita
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - pacienteId
                - especialistaId
                - fecha
                - horaInicio
                - horaFin
              properties:
                pacienteId:
                  type: integer
                  example: 10
                especialistaId:
                  type: integer
                  example: 3
                fecha:
                  type: string
                  format: date
                  example: "2026-06-15"
                horaInicio:
                  type: string
                  pattern: '^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$'
                  example: "09:00"
                horaFin:
                  type: string
                  pattern: '^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$'
                  example: "10:00"
      responses:
        '201':
          description: Cita programada y registrada de forma exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cita'
        '400':
          description: Solicitud incorrecta por conflicto o cruce de horarios en la agenda del especialista
        '401':
          description: No autorizado

  /facturas:
    post:
      summary: Emitir una nueva factura de venta interna
      operationId: crearFactura
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - citaId
                - medioPago
                - valorTotal
              properties:
                citaId:
                  type: integer
                  example: 105
                medioPago:
                  type: string
                  enum: [Efectivo, Nequi, Bancolombia]
                  example: "Nequi"
                valorTotal:
                  type: integer
                  example: 80000.00
      responses:
        '201':
          description: Factura emitida correctamente con número consecutivo interno
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 450
                  numeroConsecutivo:
                    type: string
                    example: "FACT-2026-00450"
                  citaId:
                    type: integer
                    example: 105
                  fechaEmision:
                    type: string
                    format: date-time
                    example: "2026-06-13T18:43:00Z"
                  medioPago:
                    type: string
                    example: "Nequi"
                  valorTotal:
                    type: number
                    example: 80000.00
                  estado:
                    type: string
                    example: "Pagada"
        '401':
          description: Token de autenticación inválido

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Cita:
      type: object
      properties:
        id:
          type: integer
          example: 105
        pacienteId:
          type: integer
          example: 10
        especialistaId:
          type: integer
          example: 3
        fecha:
          type: string
          format: date
          example: "2026-06-15"
        horaInicio:
          type: string
          example: "09:00"
        horaFin:
          type: string
          example: "10:00"
        estado:
          type: string
          enum: [Programada, Completada, Cancelada]
          example: "Programada"